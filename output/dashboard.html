<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 硬件产品经理 · 深圳市场分析</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
:root {
  --bg: #0a0a0a;
  --card-bg: #141414;
  --card-border: #2a2a2a;
  --text-primary: #ffffff;
  --text-secondary: #888888;
  --accent: #ff4444;
  --accent-light: #ff6666;
  --success: #00cc66;
  --warning: #ffaa00;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 12px;
  overflow-x: hidden;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 16px;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--card-border);
}
.header h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.header .meta {
  color: var(--text-secondary);
  font-size: 11px;
}

/* Stats Bar */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}
.stat-box {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  padding: 12px;
  text-align: center;
}
.stat-box .value {
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
}
.stat-box .label {
  font-size: 10px;
  color: var(--text-secondary);
  margin-top: 4px;
  text-transform: uppercase;
}

/* Main Grid */
.main-grid {
  display: grid;
  grid-template-columns: 280px 1fr 320px;
  gap: 12px;
  margin-bottom: 12px;
}

/* Side Panel */
.side-panel {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* Cards */
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  padding: 14px;
}
.card-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.card-title .value {
  color: var(--accent);
  font-weight: 700;
}

/* Chart wraps */
.chart-wrap { position: relative; }
.chart-wrap.small { height: 160px; }
.chart-wrap.medium { height: 200px; }
.chart-wrap.large { height: 280px; }
.chart-wrap.map { height: 320px; }

/* Table */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
}
.data-table th {
  text-align: left;
  padding: 8px 6px;
  color: var(--text-secondary);
  font-weight: 500;
  border-bottom: 1px solid var(--card-border);
}
.data-table td {
  padding: 6px;
  border-bottom: 1px solid #1a1a1a;
}
.data-table tr:hover td { background: #1a1a1a; }
.num { color: var(--text-secondary); font-family: "SF Mono", monospace; font-size: 10px; }
.tag {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 2px;
  font-size: 10px;
  font-weight: 600;
}
.tag-high { background: rgba(255,68,68,0.15); color: var(--accent); }
.tag-mid { background: rgba(255,170,0,0.15); color: var(--warning); }
.tag-low { background: rgba(0,204,102,0.15); color: var(--success); }

/* Scroll container */
.scroll-wrap {
  max-height: 400px;
  overflow-y: auto;
}
.scroll-wrap::-webkit-scrollbar { width: 4px; }
.scroll-wrap::-webkit-scrollbar-thumb { background: var(--card-border); }

/* Skill tags */
.skill-cloud {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.skill-tag {
  padding: 4px 8px;
  background: #1a1a1a;
  border: 1px solid var(--card-border);
  border-radius: 2px;
  font-size: 10px;
  color: var(--text-secondary);
}
.skill-tag.hot {
  color: var(--accent);
  border-color: var(--accent);
}

/* Mini metrics */
.metrics-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}
.metric-mini {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  padding: 10px;
  text-align: center;
}
.metric-mini .val { font-size: 16px; font-weight: 700; color: var(--accent); }
.metric-mini .lbl { font-size: 9px; color: var(--text-secondary); margin-top: 2px; }
</style>
</head>
<body>

<div class="container">

<div class="header">
  <div>
    <h1>Overview</h1>
    <div class="meta">AI 硬件产品经理 · 深圳 | 2026-03-19</div>
  </div>
  <div class="meta">30 POSITIONS · REAL-TIME DATA</div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="metrics-row">

    <div class="card">
      <div class="card-title">Education</div>
      <div class="chart-wrap small"><canvas id="eduChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Company Stage</div>
      <div class="chart-wrap small"><canvas id="stageChart"></canvas></div>
    </div>
  </div>

  <!-- Center -->
  <div class="side-panel">
    <div class="card">
      <div class="card-title">Shenzhen Heatmap</div>
      <div class="chart-wrap map" id="szMap"></div>
    </div>
    <div class="card">
      <div class="card-title">Salary Distribution</div>
      <div class="chart-wrap medium"><canvas id="salaryChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Salary vs Experience</div>
      <div class="chart-wrap medium"><canvas id="scatterChart"></canvas></div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="side-panel">
    <div class="card">
      <div class="card-title">Company Size</div>
      <div class="chart-wrap small"><canvas id="sizeChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Top Skills</div>

    </div>
    <div class="card">

      <div class="scroll-wrap">
        <table class="data-table" id="positionTable"></table>
      </div>
    </div>
  </div>
</div>

</div>

// ——— Helpers ———
function parseSalary(s) {
  if (!s) return null;
  const m = s.match(/(\d+)-(\d+)K/);
  if (m) return { low:+m[1], high:+m[2], mid:(+m[1]+ +m[2])/2, raw:s };
  const d = s.match(/(\d+)-(\d+) 元\/天/);
  if (d) { const l=+d[1]*21.75/1000, h=+d[2]*21.75/1000; return {low:l,high:h,mid:(l+h)/2,raw:s}; }
  return null;
}
function parseExp(e) {
  if (!e) return null;
  const m = e.match(/(\d+)-(\d+)/);
  if (m) return { low:+m[1], high:+m[2], mid:(+m[1]+ +m[2])/2 };
  const m2 = e.match(/(\d+)/);
  return m2 ? { low:+m2[1], high:+m2[1], mid:+m2[1] } : null;
}
function parseDistrict(d) {
  if (!d) return '其他';
  if (d.includes('南山')) return '南山'; if (d.includes('福田')) return '福田';
  if (d.includes('宝安')) return '宝安'; if (d.includes('龙岗')) return '龙岗';
  if (d.includes('龙华')) return '龙华'; return '其他';
}

  {name:'宝安区',value:districtData['宝安']?.count||0,avgSalary:districtData['宝安']?Math.round(districtData['宝安'].totalSalary/districtData['宝安'].count):0},
  {name:'南山区',value:districtData['南山']?.count||0,avgSalary:districtData['南山']?Math.round(districtData['南山'].totalSalary/districtData['南山'].count):0},
  {name:'福田区',value:districtData['福田']?.count||0,avgSalary:districtData['福田']?Math.round(districtData['福田'].totalSalary/districtData['福田'].count):0},
  {name:'罗湖区',value:districtData['罗湖']?.count||0,avgSalary:0},
  {name:'盐田区',value:districtData['盐田']?.count||0,avgSalary:0},
  {name:'龙华区',value:districtData['龙华']?.count||0,avgSalary:districtData['龙华']?Math.round(districtData['龙华'].totalSalary/districtData['龙华'].count):0},
  {name:'龙岗区',value:districtData['龙岗']?.count||0,avgSalary:districtData['龙岗']?Math.round(districtData['龙岗'].totalSalary/districtData['龙岗'].count):0}
];

const maxCount = Math.max(...szMapData.map(d=>d.value),1);

// 使用内嵌的 GeoJSON 数据，避免 CORS 问题
echarts.registerMap('shenzhen', SHENZHEN_GEOJSON);
const szMapChart = echarts.init(document.getElementById('szMap'));

  szMapChart.setOption({
      backgroundColor:'transparent',
      tooltip:{
        trigger:'item',
        backgroundColor:'rgba(20,20,20,0.95)',
        borderColor:'#ff4444',
        borderWidth:1,
        textStyle:{color:'#ccc',fontSize:11},
        formatter:(p)=>{
          const d=szMapData.find(x=>x.name===p.name);
          return `<strong style="color:#ff4444">${p.name}</strong><br/>职位：${d?.value||0}个<br/>均薪：${d?.avgSalary||0}K`;
        }
      },
      series:[{
        type:'map',
        map:'shenzhen',
        data:szMapData,
        roam:false,
        zoom:1,
        left:'8%',
        right:'8%',
        top:'10%',
        bottom:'10%',
        itemStyle:{
          color:(p)=>{
            const d=szMapData.find(x=>x.name===p.name);
            const v=d?.value||0;
            if(v===0) return '#0a0a0a';
            const i=v/maxCount;
            // 职位越多越红越亮
            return `rgb(${255},${Math.round(80-i*60)},${Math.round(80-i*60)})`;
          },
          borderColor:'#444',
          borderWidth:0.5,
          shadowBlur:10,
          shadowColor:'rgba(255,68,68,0.5)'
        },
        emphasis:{
          itemStyle:{color:'#ff4444',borderColor:'#ff8888',borderWidth:1.5,shadowBlur:15,shadowColor:'rgba(255,68,68,0.8)'},
          label:{show:true,color:'#fff',fontSize:11,fontWeight:'bold'}
        },
        label:{
          show:true,
          formatter:'{b}',
          color:(p)=>{
            const d=szMapData.find(x=>x.name===p.name);
            return d?.value>0 ? '#fff' : '#444';
          },
          fontSize:10,
          fontWeight:(p)=>{
            const d=szMapData.find(x=>x.name===p.name);
            return d?.value>0 ? 'bold' : 'normal';
          }
        }
      }]
    });

window.addEventListener('resize',()=>szMapChart.resize());

// Skills
const skillCount={};
JOBS.forEach(j => (j.skills||[]).forEach(s => { if(s.trim().length>=2) skillCount[s.trim()]=(skillCount[s.trim()]||0)+1; }));
const topSkills = Object.entries(skillCount).sort((a,b)=>b[1]-a[1]).slice(0,15);
document.getElementById('skillCloud').innerHTML = topSkills.map(([n,c],i)=>
  `<span class="skill-tag${i<5?' hot':''}">${n} ${c}</span>`).join('');

// Table
const sorted = [...JOBS].sort((a,b)=>(parseSalary(b.salary)?.mid||0)-(parseSalary(a.salary)?.mid||0));
document.getElementById('positionTable').innerHTML = '<tr><th>#</th><th>Position</th><th>Salary</th><th>Exp</th></tr>'+
sorted.map((j,i)=>{
  const s=parseSalary(j.salary);
  const tag = s?.mid>=50?'tag-high':s?.mid>=30?'tag-mid':'tag-low';
  return `<tr><td class="num">${String(i+1).padStart(2,'0')}</td>
    <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${j.title}</td>
    <td><span class="tag ${tag}">${j.salary}</span></td>
    <td class="num">${j.experience||'-'}</td></tr>`;
}).join('');
</script>
</body>
</html>
